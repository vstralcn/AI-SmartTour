name: ai-smarttour

services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-smarttour}@postgres:5432/smarttour"
      REDIS_URL: "redis://redis:6379/0"
      VECTOR_DB_PATH: "/app/knowledge_base/vectors"
      KNOWLEDGE_UPLOAD_DIR: "/app/knowledge_base/uploads"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_API_BASE: "${LLM_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
      LLM_MODEL: "${LLM_MODEL:-qwen-plus}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_TOKEN_SECRET: "${ADMIN_TOKEN_SECRET:-}"
      ADMIN_TOKEN_TTL_MINUTES: "${ADMIN_TOKEN_TTL_MINUTES:-480}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}"
      DIGITAL_HUMAN_URL: "http://digital-human:8001"
      XF_AVATAR_APP_ID: "${XF_AVATAR_APP_ID:-}"
      XF_AVATAR_API_KEY: "${XF_AVATAR_API_KEY:-}"
      XF_AVATAR_API_SECRET: "${XF_AVATAR_API_SECRET:-}"
      XF_AVATAR_SCENE_ID: "${XF_AVATAR_SCENE_ID:-}"
      XF_AVATAR_AVATAR_ID: "${XF_AVATAR_AVATAR_ID:-}"
      XF_AVATAR_VCN: "${XF_AVATAR_VCN:-}"
      XF_AVATAR_SERVER_URL: "${XF_AVATAR_SERVER_URL:-wss://avatar.cn-huadong-1.xf-yun.com/v1/interact}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - knowledge_data:/app/knowledge_base
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    init: true

  tourist-app:
    build:
      context: ./frontend/tourist-app
    ports:
      - "${TOURIST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  admin-panel:
    build:
      context: ./frontend/admin-panel
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smarttour
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-smarttour}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smarttour"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  digital-human:
    build:
      context: ./digital_human
    ports:
      - "${DIGITAL_HUMAN_PORT:-8001}:8001"
    profiles:
      - gpu
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pgdata:
  redisdata:
  knowledge_data:
