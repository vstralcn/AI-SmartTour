services:
  # 后端API服务
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/smarttour
      - REDIS_URL=redis://redis:6379/0
      - VECTOR_DB_PATH=/app/knowledge_base/vectors
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/knowledge_base:/app/knowledge_base

  # 前端-游客端
  tourist-app:
    build: ./frontend/tourist-app
    ports:
      - "3000:80"
    depends_on:
      - backend

  # 前端-管理后台
  admin-panel:
    build: ./frontend/admin-panel
    ports:
      - "3001:80"
    depends_on:
      - backend

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smarttour
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis（缓存）
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 数字人推理服务（需要GPU，按需启动）
  # 启用方式: docker compose --profile gpu up -d
  digital-human:
    build: ./digital_human
    ports:
      - "8001:8001"
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pgdata:
